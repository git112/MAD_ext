name: smart_event_checkin
description: Smart Event Check-in & Crowd Management App – Production-ready Flutter application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # QR Code Scanner
  mobile_scanner: ^5.0.0

  # QR Code Generation (for demo participant QR codes)
  qr_flutter: ^4.1.0

  # UUID generation
  uuid: ^4.4.2

  # Connectivity (for sync detection)
  connectivity_plus: ^6.0.5

  # Path Provider (Hive needs it on some platforms)
  path_provider: ^2.1.3

  # Intl (date formatting)
  intl: ^0.19.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Hive code generation
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
